<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wordoban</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1d2430;
      --muted: #5d6878;
      --panel: #ffffff;
      --line: #d7dde7;
      --floor: #edf1f6;
      --wall: #2f3947;
      --target: #f4c75f;
      --block: #3c7f78;
      --distractor: #b45d4f;
      --player: #2f66b3;
      --focus: #111827;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(rgba(255, 255, 255, .22), rgba(255, 255, 255, .22)),
        #f8f3e9 url("assets/background.jpg") center / cover fixed;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: .95;
      letter-spacing: 0;
    }

    .logo {
      display: block;
      width: min(330px, 70vw);
      height: auto;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .board-wrap {
      display: grid;
      justify-items: center;
      gap: 10px;
      min-width: 0;
    }

    canvas {
      width: min(100%, 78vh);
      max-width: 760px;
      aspect-ratio: 1;
      border: 1px solid #c5cfdd;
      background: var(--floor);
      box-shadow: 0 18px 45px rgba(31, 41, 55, .12);
      touch-action: none;
    }

    aside {
      width: min(360px, calc(100% - 24px));
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 14px;
      display: grid;
      gap: 16px;
      position: fixed;
      top: 92px;
      right: 18px;
      z-index: 10;
      box-shadow: 0 18px 45px rgba(31, 41, 55, .16);
    }

    aside[hidden] {
      display: none;
    }

    .settings-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .settings-head h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .icon-button {
      width: 42px;
      min-height: 42px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 1.15rem;
    }

    .control-group {
      display: grid;
      gap: 8px;
    }

    .control-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .control-value {
      color: var(--ink);
      font-size: .9rem;
      font-weight: 800;
      white-space: nowrap;
    }

    label,
    .group-label {
      font-size: .78rem;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    select,
    input,
    button {
      font: inherit;
    }

    select,
    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid #b8c1cf;
      background: #fff;
      color: var(--ink);
      padding: 0 10px;
      border-radius: 6px;
    }

    input[type="range"] {
      min-height: 34px;
      padding: 0;
      border: 0;
      accent-color: var(--player);
      cursor: pointer;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      min-height: 42px;
      border: 1px solid #aab5c5;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
      cursor: pointer;
    }

    button.primary {
      border-color: #2f66b3;
      background: #2f66b3;
      color: #fff;
    }

    button.icon-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 16px;
    }

    button.icon-label svg {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    button:focus-visible,
    select:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(47, 102, 179, .32);
      outline-offset: 2px;
    }

    .dpad {
      width: 168px;
      justify-self: center;
      display: grid;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 4px;
    }

    .dpad button {
      min-height: 52px;
      padding: 0;
      font-size: 1.2rem;
      line-height: 1;
    }

    .dpad .up {
      grid-column: 2;
    }

    .dpad .left {
      grid-column: 1;
      grid-row: 2;
    }

    .dpad .right {
      grid-column: 3;
      grid-row: 2;
    }

    .dpad .down {
      grid-column: 2;
      grid-row: 3;
    }

    @media (max-width: 860px) {
      header {
        align-items: start;
        flex-direction: column;
      }

      aside {
        top: 86px;
        right: 12px;
      }

      canvas {
        width: min(100%, 92vh);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <img class="logo" src="assets/logo.png" alt="Wordoban">
        <p class="subtitle">Hear the word, choose the right syllables, push them into the target row.</p>
      </div>
      <div class="toolbar-actions">
        <button id="resetButton" type="button">Reset</button>
        <button id="newButton" type="button">New Puzzle</button>
        <button class="primary icon-label" id="speakButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M4 9.5v5h3.4l4.1 3.4c.7.6 1.8.1 1.8-.8V6.9c0-.9-1.1-1.4-1.8-.8L7.4 9.5H4Z"></path>
            <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2.2" d="M16 9c.8.8 1.2 1.8 1.2 3s-.4 2.2-1.2 3"></path>
            <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2.2" d="M18.8 6.5c1.5 1.5 2.3 3.4 2.3 5.5s-.8 4-2.3 5.5"></path>
          </svg>
          <span>Replay Word</span>
        </button>
        <button class="icon-button" id="settingsButton" type="button" aria-label="Open setup" aria-expanded="false" aria-controls="settingsPanel">⚙</button>
      </div>
    </header>

    <section class="board-wrap" aria-label="Game board">
      <canvas id="board" width="900" height="900"></canvas>
      <div class="dpad" aria-label="Directional controls">
        <button class="up" type="button" data-dir="0,-1" aria-label="Move up">▲</button>
        <button class="left" type="button" data-dir="-1,0" aria-label="Move left">◀</button>
        <button class="right" type="button" data-dir="1,0" aria-label="Move right">▶</button>
        <button class="down" type="button" data-dir="0,1" aria-label="Move down">▼</button>
      </div>
    </section>

    <aside id="settingsPanel" hidden>
      <div class="settings-head">
        <h2>Setup</h2>
        <button class="icon-button" id="closeSettingsButton" type="button" aria-label="Close setup">×</button>
      </div>

      <div class="control-group">
        <div class="control-heading">
          <label for="lengthSelect">Word length</label>
          <span class="control-value" id="lengthValue">2 syllables</span>
        </div>
        <input id="lengthSelect" type="range" min="1" max="4" step="1" value="2">
      </div>

      <div class="control-group">
        <div class="control-heading">
          <label for="sizeSelect">Board size</label>
          <span class="control-value" id="sizeValue">12 x 12</span>
        </div>
        <input id="sizeSelect" type="range" min="8" max="20" step="1" value="12">
      </div>

      <div class="control-group">
        <div class="control-heading">
          <label for="wallCountSelect">Wall segments</label>
          <span class="control-value" id="wallCountValue">8 walls</span>
        </div>
        <input id="wallCountSelect" type="range" min="0" max="20" step="4" value="8">
      </div>

      <div class="control-group">
        <div class="control-heading">
          <label for="wallMinLengthSelect">Min wall length</label>
          <span class="control-value" id="wallMinLengthValue">1 tile</span>
        </div>
        <input id="wallMinLengthSelect" type="range" min="1" max="6" step="1" value="1">
      </div>

      <div class="control-group">
        <div class="control-heading">
          <label for="wallLengthSelect">Max wall length</label>
          <span class="control-value" id="wallLengthValue">3 tiles</span>
        </div>
        <input id="wallLengthSelect" type="range" min="1" max="6" step="1" value="3">
      </div>
    </aside>
  </main>

  <script>
    const DEFAULT_WORDS = [
      { word: "cat", syllables: ["CAT"], distractors: ["CAP", "CUT", "COT", "KAT"] },
      { word: "dog", syllables: ["DOG"], distractors: ["DIG", "DUG", "LOG", "DOT"] },
      { word: "moon", syllables: ["MOON"], distractors: ["MOO", "MUN", "NOON", "MAN"] },
      { word: "rain", syllables: ["RAIN"], distractors: ["RAY", "RAN", "REIN", "MAIN"] },
      { word: "banana", syllables: ["BA", "NA", "NA"], distractors: ["BO", "NAN", "NO", "BAN"] },
      { word: "basket", syllables: ["BAS", "KET"], distractors: ["BAT", "KIT", "BASK", "SET"] },
      { word: "turtle", syllables: ["TUR", "TLE"], distractors: ["TER", "TALL", "TIR", "DLE"] },
      { word: "sunset", syllables: ["SUN", "SET"], distractors: ["SIN", "SIT", "SENT", "SUP"] },
      { word: "rocket", syllables: ["ROCK", "ET"], distractors: ["RAK", "KIT", "ROD", "IT"] },
      { word: "butterfly", syllables: ["BUT", "TER", "FLY"], distractors: ["BAT", "DER", "FLEE", "BUTT", "TIE"] },
      { word: "elephant", syllables: ["EL", "E", "PHANT"], distractors: ["AL", "EE", "FANT", "PLANT", "ANT"] },
      { word: "computer", syllables: ["COM", "PU", "TER"], distractors: ["CON", "POO", "DER", "CUE", "TERM"] },
      { word: "dinosaur", syllables: ["DI", "NO", "SAUR"], distractors: ["DYE", "NEW", "SORE", "DIN", "NOR"] },
      { word: "alligator", syllables: ["AL", "LI", "GA", "TOR"], distractors: ["EL", "LEE", "GO", "DOOR", "GATE", "TAR"] },
      { word: "helicopter", syllables: ["HEL", "I", "COP", "TER"], distractors: ["HILL", "EE", "CAP", "DER", "COPPER", "TUR"] },
      { word: "watermelon", syllables: ["WA", "TER", "MEL", "ON"], distractors: ["WAY", "DER", "MAIL", "AN", "WET", "MELON"] },
      { word: "caterpillar", syllables: ["CAT", "ER", "PIL", "LAR"], distractors: ["KAT", "AR", "PAL", "LER", "PILL", "CART"] }
    ];
    let WORDS = DEFAULT_WORDS.slice();

    const TILE = {
      FLOOR: 0,
      WALL: 1
    };

    const DIRS = [
      { x: 1, y: 0 },
      { x: -1, y: 0 },
      { x: 0, y: 1 },
      { x: 0, y: -1 }
    ];

    const GENERATION_ATTEMPTS = 6;
    const GENERATION_SOLVER_LIMIT = 8000;
    const FLOOR_PALETTE = { base: "#f7fbf4", soft: "#edf8ee", accent: "#e6f3f7", grid: "#b9d7d1" };

    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const lengthSelect = document.getElementById("lengthSelect");
    const sizeSelect = document.getElementById("sizeSelect");
    const wallCountSelect = document.getElementById("wallCountSelect");
    const wallMinLengthSelect = document.getElementById("wallMinLengthSelect");
    const wallLengthSelect = document.getElementById("wallLengthSelect");
    const lengthValue = document.getElementById("lengthValue");
    const sizeValue = document.getElementById("sizeValue");
    const wallCountValue = document.getElementById("wallCountValue");
    const wallMinLengthValue = document.getElementById("wallMinLengthValue");
    const wallLengthValue = document.getElementById("wallLengthValue");
    const speakButton = document.getElementById("speakButton");
    const settingsButton = document.getElementById("settingsButton");
    const settingsPanel = document.getElementById("settingsPanel");
    const closeSettingsButton = document.getElementById("closeSettingsButton");
    const resetButton = document.getElementById("resetButton");
    const newButton = document.getElementById("newButton");

    let level = null;
    let initialState = null;
    let state = null;
    let moves = 0;
    let won = false;
    let lastWordKey = "";
    const sprites = {
      block: loadSprite("assets/block.png"),
      player: loadSprite("assets/player.png")
    };

    function loadSprite(src) {
      if (typeof Image === "undefined") return { image: null, ready: false };
      const sprite = { image: new Image(), ready: false };
      sprite.image.onload = () => {
        sprite.ready = true;
        draw();
      };
      sprite.image.src = src;
      return sprite;
    }

    function randInt(max) {
      return Math.floor(Math.random() * max);
    }

    function sample(items) {
      return items[randInt(items.length)];
    }

    function shuffle(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = randInt(i + 1);
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function cellKey(x, y) {
      return x + "," + y;
    }

    function idx(x, y, size) {
      return y * size + x;
    }

    function posFromIdx(index, size) {
      return { x: index % size, y: Math.floor(index / size) };
    }

    function getWordsForLength(lengthValue) {
      return WORDS.filter((entry) => {
        if (lengthValue === "4") return entry.syllables.length >= 4;
        return entry.syllables.length === Number(lengthValue);
      });
    }

    async function loadWords() {
      if (!window.fetch) return;
      try {
        const response = await fetch("assets/words.yaml", { cache: "no-store" });
        if (!response.ok) return;
        const parsed = parseWordsYaml(await response.text());
        if (parsed.length) WORDS = parsed;
      } catch (error) {
        WORDS = DEFAULT_WORDS.slice();
      }
    }

    function parseWordsYaml(source) {
      const words = [];
      let current = null;

      source.split(/\r?\n/).forEach((line) => {
        const group = line.match(/^(\d+):\s*$/);
        if (group) {
          current = null;
          return;
        }

        const item = line.match(/^\s*-\s+word:\s*"?([^"]+?)"?\s*$/);
        if (item) {
          current = { word: item[1], syllables: [], distractors: [] };
          words.push(current);
          return;
        }

        if (!current) return;
        const field = line.match(/^\s+(syllables|distractors):\s*\[(.*)\]\s*$/);
        if (!field) return;
        current[field[1]] = parseYamlInlineList(field[2]);
      });

      return words.filter((entry) => entry.word && entry.syllables.length && entry.distractors.length);
    }

    function parseYamlInlineList(value) {
      if (!value.trim()) return [];
      return value.split(",").map((item) => item.trim().replace(/^"|"$/g, ""));
    }

    function distractorCount(syllableCount, size) {
      const ranges = {
        1: [2, 3],
        2: [3, 4],
        3: [4, 5],
        4: [5, 7]
      };
      const [min, max] = ranges[Math.min(4, syllableCount)];
      const sizeBonus = size >= 12 ? 1 : 0;
      return Math.min(max + sizeBonus, min + randInt(max - min + 1) + sizeBonus);
    }

    function createGrid(size, reserved, wallCount, minWallLength, maxWallLength) {
      const grid = Array.from({ length: size }, () => Array(size).fill(TILE.FLOOR));
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          if (x === 0 || y === 0 || x === size - 1 || y === size - 1) {
            grid[y][x] = TILE.WALL;
          }
        }
      }

      let placed = 0;
      let attempts = 0;
      const attemptLimit = Math.max(80, wallCount * 30);
      while (placed < wallCount && attempts < attemptLimit) {
        attempts++;
        const horizontal = Math.random() < 0.5;
        const length = minWallLength + randInt(Math.max(1, maxWallLength - minWallLength + 1));
        const maxX = size - 3 - (horizontal ? length - 1 : 0);
        const maxY = size - 3 - (horizontal ? 0 : length - 1);
        if (maxX < 2 || maxY < 2) continue;
        const x = 2 + randInt(maxX - 1);
        const y = 2 + randInt(maxY - 1);
        const cells = [];
        let blocked = false;

        for (let i = 0; i < length; i++) {
          const cx = x + (horizontal ? i : 0);
          const cy = y + (horizontal ? 0 : i);
          if (reserved.has(cellKey(cx, cy)) || grid[cy][cx] === TILE.WALL || wallWouldTouch(grid, cx, cy)) {
            blocked = true;
            break;
          }
          cells.push({ x: cx, y: cy });
        }
        if (blocked) continue;

        cells.forEach((cell) => {
          grid[cell.y][cell.x] = TILE.WALL;
        });
        if (floorIsConnected(grid)) {
          placed++;
        } else {
          cells.forEach((cell) => {
            grid[cell.y][cell.x] = TILE.FLOOR;
          });
        }
      }
      return grid;
    }

    function wallWouldTouch(grid, x, y) {
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          if (dx === 0 && dy === 0) continue;
          if (grid[y + dy]?.[x + dx] === TILE.WALL) return true;
        }
      }
      return false;
    }

    function floorIsConnected(grid) {
      const size = grid.length;
      let start = null;
      let floorCount = 0;
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          if (grid[y][x] === TILE.FLOOR) {
            floorCount++;
            if (!start) start = { x, y };
          }
        }
      }
      if (!start) return false;

      const seen = new Set([cellKey(start.x, start.y)]);
      const queue = [start];
      for (let head = 0; head < queue.length; head++) {
        const current = queue[head];
        for (const dir of DIRS) {
          const nx = current.x + dir.x;
          const ny = current.y + dir.y;
          const key = cellKey(nx, ny);
          if (grid[ny]?.[nx] !== TILE.FLOOR || seen.has(key)) continue;
          seen.add(key);
          queue.push({ x: nx, y: ny });
        }
      }
      return seen.size === floorCount;
    }

    function generateLevel() {
      const size = normalizeBoardSize();
      const wallCount = Number(wallCountSelect.value);
      const minWallLength = normalizeWallLengths().min;
      const maxWallLength = Number(wallLengthSelect.value);
      const wordOptions = getWordsForLength(lengthSelect.value);
      const word = chooseDifferentWord(wordOptions);
      const syllables = word.syllables;
      const targetY = 1;
      const startX = Math.floor((size - syllables.length) / 2);
      const targetCells = syllables.map((_, i) => idx(startX + i, targetY, size));

      const reserved = new Set();
      for (let i = 0; i < syllables.length; i++) {
        for (let y = targetY; y <= size - 3; y++) {
          reserved.add(cellKey(startX + i, y));
        }
      }
      reserved.add(cellKey(Math.floor(size / 2), size - 2));

      for (let attempt = 0; attempt < GENERATION_ATTEMPTS; attempt++) {
        const grid = createGrid(size, reserved, wallCount, minWallLength, maxWallLength);
        const occupied = new Set(targetCells.map((cell) => "t" + cell));

        let player = idx(Math.floor(size / 2), Math.min(size - 2, targetY + 3), size);
        if (occupied.has(String(player)) || grid[posFromIdx(player, size).y][posFromIdx(player, size).x] === TILE.WALL) {
          player = idx(startX, Math.min(size - 2, targetY + 3), size);
        }
        occupied.add(String(player));

        const count = distractorCount(syllables.length, size);
        const blocks = createScatteredBlocks(word, count, grid, occupied, size, targetY + 2, startX);
        if (!blocks) continue;

        const candidate = {
          size,
          grid,
          word,
          targetCells,
          targetY,
          startX,
          blocks,
          player,
          wallCount,
          minWallLength,
          maxWallLength
        };
        const solver = verifyConstructedSolution(candidate);
        if (solver.solved) {
          candidate.solverStates = solver.states;
          candidate.solutionLength = solver.depth;
          return candidate;
        }
      }

      return generateFallbackLevel(size, word, targetCells, startX, targetY, wallCount, minWallLength, maxWallLength);
    }

    function createScatteredBlocks(word, distractorTotal, grid, occupied, size, minY, startX) {
      const blocks = [];
      const correct = shuffle(word.syllables.map((text, i) => ({ id: "c" + i, text, correct: true, targetIndex: i })));
      const targetColumns = new Set(word.syllables.map((_, i) => startX + i));
      const distractors = shuffle(word.distractors).slice(0, distractorTotal).map((text, i) => ({
        id: "d" + i,
        text,
        correct: false
      }));

      for (const block of correct) {
        const pos = findColumnFreeCell(grid, occupied, size, minY + 1, startX + block.targetIndex);
        if (pos === null) return null;
        delete block.targetIndex;
        blocks.push({ ...block, pos });
        occupied.add(String(pos));
      }

      for (const block of distractors) {
        const pos = findFreeCell(grid, occupied, size, minY, targetColumns);
        if (pos === null) return null;
        blocks.push({ ...block, pos });
        occupied.add(String(pos));
      }

      return shuffle(blocks);
    }

    function normalizeBoardSize() {
      const raw = Number(sizeSelect.value);
      const size = Math.max(8, Math.min(20, Math.round(Number.isFinite(raw) ? raw : 12)));
      sizeSelect.value = String(size);
      return size;
    }

    function normalizeWallLengths() {
      const min = Math.max(1, Math.min(6, Math.round(Number(wallMinLengthSelect.value) || 1)));
      let max = Math.max(1, Math.min(6, Math.round(Number(wallLengthSelect.value) || 3)));
      if (max < min) max = min;
      wallMinLengthSelect.value = String(min);
      wallLengthSelect.value = String(max);
      return { min, max };
    }

    function updateSettingLabels() {
      const length = Number(lengthSelect.value);
      const size = normalizeBoardSize();
      const wallCount = Number(wallCountSelect.value);
      const wallLengths = normalizeWallLengths();

      lengthValue.textContent = length === 4 ? "4+ syllables" : length + " syllable" + (length === 1 ? "" : "s");
      sizeValue.textContent = size + " x " + size;
      wallCountValue.textContent = wallCount + " wall" + (wallCount === 1 ? "" : "s");
      wallMinLengthValue.textContent = wallLengths.min + " tile" + (wallLengths.min === 1 ? "" : "s");
      wallLengthValue.textContent = wallLengths.max + " tile" + (wallLengths.max === 1 ? "" : "s");
    }

    function applySettingChange() {
      updateSettingLabels();
      loadNewLevel();
    }

    function chooseDifferentWord(options) {
      if (options.length <= 1) return sample(options);
      let next = sample(options);
      let tries = 0;
      while (next.word === lastWordKey && tries < 8) {
        next = sample(options);
        tries++;
      }
      lastWordKey = next.word;
      return next;
    }

    function findFreeCell(grid, occupied, size, minY, forbiddenColumns = new Set()) {
      const cells = [];
      const startY = Math.max(2, minY);
      for (let y = startY; y <= size - 3; y++) {
        for (let x = 2; x <= size - 3; x++) {
          if (forbiddenColumns.has(x)) continue;
          const pos = idx(x, y, size);
          if (grid[y][x] === TILE.FLOOR && !occupied.has(String(pos))) cells.push(pos);
        }
      }
      return cells.length ? sample(cells) : null;
    }

    function findColumnFreeCell(grid, occupied, size, minY, column) {
      const cells = [];
      const startY = Math.max(3, minY);
      for (let y = startY; y <= size - 3; y++) {
        const pos = idx(column, y, size);
        if (grid[y]?.[column] === TILE.FLOOR && !occupied.has(String(pos))) cells.push(pos);
      }
      return cells.length ? sample(cells) : null;
    }

    function findPreferredFreeCell(grid, occupied, size, minY, preferredX) {
      const cells = [];
      const startY = Math.max(2, minY);
      for (let y = startY; y <= size - 3; y++) {
        for (let x = 2; x <= size - 3; x++) {
          const pos = idx(x, y, size);
          if (grid[y][x] !== TILE.FLOOR || occupied.has(String(pos))) continue;
          const distance = Math.abs(x - preferredX);
          if (distance <= 2) cells.push({ pos, distance });
        }
      }
      if (!cells.length) return findFreeCell(grid, occupied, size, minY);
      const near = cells.filter((cell) => cell.distance <= 1);
      return sample(near.length ? near : cells).pos;
    }

    function generateFallbackLevel(size, word, targetCells, startX, targetY, wallCount, minWallLength, maxWallLength) {
      const grid = Array.from({ length: size }, () => Array(size).fill(TILE.FLOOR));
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          if (x === 0 || y === 0 || x === size - 1 || y === size - 1) grid[y][x] = TILE.WALL;
        }
      }

      for (let attempt = 0; attempt < GENERATION_ATTEMPTS; attempt++) {
        const occupied = new Set(targetCells.map((cell) => "t" + cell));
        const player = idx(Math.floor(size / 2), targetY + 3, size);
        occupied.add(String(player));
        const blocks = createScatteredBlocks(word, distractorCount(word.syllables.length, size), grid, occupied, size, targetY + 2, startX);
        if (!blocks) continue;
        const fallback = {
          size,
          grid,
          word,
          targetCells,
          targetY,
          startX,
          blocks,
          player,
          wallCount,
          minWallLength,
          maxWallLength
        };
        const solver = verifyConstructedSolution(fallback);
        if (solver.solved) {
          fallback.solverStates = solver.states;
          fallback.solutionLength = solver.depth;
          return fallback;
        }
      }

      return generateSimpleFallbackLevel(size, word, targetCells, startX, targetY, wallCount, minWallLength, maxWallLength);
    }

    function generateSimpleFallbackLevel(size, word, targetCells, startX, targetY, wallCount, minWallLength, maxWallLength) {
      const grid = Array.from({ length: size }, () => Array(size).fill(TILE.FLOOR));
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          if (x === 0 || y === 0 || x === size - 1 || y === size - 1) grid[y][x] = TILE.WALL;
        }
      }
      const occupied = new Set(targetCells.map((cell) => "t" + cell));
      const player = idx(Math.floor(size / 2), targetY + 3, size);
      occupied.add(String(player));
      const blocks = [];
      word.syllables.forEach((text, i) => {
        let pos = findColumnFreeCell(grid, occupied, size, targetY + 3, startX + i);
        if (pos === null) pos = findFreeCell(grid, occupied, size, targetY + 2);
        if (pos === null) return;
        blocks.push({ id: "c" + i, text, correct: true, pos });
        occupied.add(String(pos));
      });
      shuffle(word.distractors).slice(0, distractorCount(word.syllables.length, size)).forEach((text, i) => {
        const pos = findFreeCell(grid, occupied, size, targetY + 2);
        if (pos !== null) {
          blocks.push({ id: "d" + i, text, correct: false, pos });
          occupied.add(String(pos));
        }
      });
      const fallback = { size, grid, word, targetCells, targetY, startX, blocks, player, wallCount, minWallLength, maxWallLength };
      const solver = verifyConstructedSolution(fallback);
      fallback.solverStates = solver.states;
      fallback.solutionLength = solver.depth;
      return fallback;
    }

    function verifyConstructedSolution(candidate) {
      const allBlocks = mapBlocks(candidate.blocks.map((block) => block.pos));
      const staticBlocks = new Set(candidate.blocks.map((block) => block.pos));
      const reachable = reachablePlayerCells(candidate, candidate.player, allBlocks, new Set());
      let checks = 0;

      for (let i = 0; i < candidate.word.syllables.length; i++) {
        const block = candidate.blocks.find((item) => item.id === "c" + i);
        if (!block) return { solved: false, states: checks, depth: 0 };
        const pos = posFromIdx(block.pos, candidate.size);
        const target = posFromIdx(candidate.targetCells[i], candidate.size);
        checks++;
        if (pos.x !== target.x || pos.y <= candidate.targetY + 1) return { solved: false, states: checks, depth: 0 };
        for (let y = candidate.targetY; y < pos.y; y++) {
          if (!isFloor(candidate, pos.x, y)) return { solved: false, states: checks, depth: 0 };
          const lanePos = idx(pos.x, y, candidate.size);
          if (lanePos !== candidate.targetCells[i] && staticBlocks.has(lanePos)) return { solved: false, states: checks, depth: 0 };
        }
        const stand = idx(pos.x, pos.y + 1, candidate.size);
        if (!isFloor(candidate, pos.x, pos.y + 1) || !reachable.has(stand)) return { solved: false, states: checks, depth: 0 };
      }

      return { solved: true, states: checks, depth: candidate.word.syllables.length };
    }

    function solveLevel(candidate, limit) {
      const movingBlocks = candidate.blocks.filter((block) => block.correct);
      const staticBlocks = new Set(candidate.blocks.filter((block) => !block.correct).map((block) => block.pos));
      const startPositions = movingBlocks.map((block) => block.pos);
      const startKey = encodeState(candidate.player, startPositions);
      const queue = [{ player: candidate.player, positions: startPositions, depth: 0 }];
      const seen = new Set([startKey]);

      for (let head = 0; head < queue.length && seen.size <= limit; head++) {
        const current = queue[head];
        if (isSolverGoal(candidate, movingBlocks, current.positions)) {
          return { solved: true, states: seen.size, depth: current.depth };
        }

        const blockAt = mapBlocks(current.positions);
        const reachable = reachablePlayerCells(candidate, current.player, blockAt, staticBlocks);

        for (let blockIndex = 0; blockIndex < current.positions.length; blockIndex++) {
          const blockPos = posFromIdx(current.positions[blockIndex], candidate.size);
          for (const dir of DIRS) {
          const standX = blockPos.x - dir.x;
          const standY = blockPos.y - dir.y;
          const bx = blockPos.x + dir.x;
          const by = blockPos.y + dir.y;
          const standPos = idx(standX, standY, candidate.size);
          if (!isFloor(candidate, bx, by)) continue;
          const pushedPos = idx(bx, by, candidate.size);
          if (!reachable.has(standPos)) continue;
          if (blockAt.has(pushedPos) || staticBlocks.has(pushedPos)) continue;
          const nextPositions = current.positions.slice();
          nextPositions[blockIndex] = pushedPos;
          addSearchState(queue, seen, current.positions[blockIndex], nextPositions, current.depth + 1, limit);
          }
        }
      }

      return { solved: false, states: seen.size, depth: 0 };
    }

    function reachablePlayerCells(candidate, start, movingBlocks, staticBlocks) {
      const seen = new Set([start]);
      const queue = [start];
      for (let head = 0; head < queue.length; head++) {
        const current = posFromIdx(queue[head], candidate.size);
        for (const dir of DIRS) {
          const nx = current.x + dir.x;
          const ny = current.y + dir.y;
          if (!isFloor(candidate, nx, ny)) continue;
          const next = idx(nx, ny, candidate.size);
          if (seen.has(next) || movingBlocks.has(next) || staticBlocks.has(next)) continue;
          seen.add(next);
          queue.push(next);
        }
      }
      return seen;
    }

    function isSolverGoal(candidate, movingBlocks, positions) {
      for (let i = 0; i < candidate.targetCells.length; i++) {
        const target = candidate.targetCells[i];
        const blockIndex = positions.indexOf(target);
        if (blockIndex === -1) return false;
        const block = movingBlocks[blockIndex];
        if (!block || block.text !== candidate.word.syllables[i]) return false;
      }
      return true;
    }

    function addSearchState(queue, seen, player, positions, depth, limit) {
      if (seen.size > limit) return;
      const key = encodeState(player, positions);
      if (seen.has(key)) return;
      seen.add(key);
      queue.push({ player, positions, depth });
    }

    function encodeState(player, positions) {
      return player + "|" + positions.join(",");
    }

    function mapBlocks(positions) {
      const map = new Map();
      positions.forEach((pos, index) => map.set(pos, index));
      return map;
    }

    function isFloor(candidate, x, y) {
      return candidate.grid[y]?.[x] === TILE.FLOOR;
    }

    function isGoal(candidate, positions) {
      for (let i = 0; i < candidate.targetCells.length; i++) {
        const target = candidate.targetCells[i];
        const blockIndex = positions.indexOf(target);
        if (blockIndex === -1) return false;
        const block = candidate.blocks[blockIndex];
        if (!block.correct || block.text !== candidate.word.syllables[i]) return false;
      }
      return true;
    }

    function loadNewLevel() {
      level = generateLevel();
      initialState = {
        player: level.player,
        blocks: level.blocks.map((block) => ({ ...block }))
      };
      resetCurrentLevel();
      speakWord();
    }

    function resetCurrentLevel() {
      state = {
        player: initialState.player,
        blocks: initialState.blocks.map((block) => ({ ...block }))
      };
      moves = 0;
      won = false;
      updateMeta();
      draw();
    }

    function updateMeta() {
    }

    function speakWord() {
      if (!level || !("speechSynthesis" in window)) {
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(level.word.word);
      utterance.rate = 0.82;
      utterance.pitch = 1;
      window.speechSynthesis.speak(utterance);
    }

    function movePlayer(dx, dy) {
      if (!level || won) return;
      const player = posFromIdx(state.player, level.size);
      const nx = player.x + dx;
      const ny = player.y + dy;
      if (!isFloor(level, nx, ny)) return;

      const next = idx(nx, ny, level.size);
      const blockIndex = state.blocks.findIndex((block) => block.pos === next);
      if (blockIndex === -1) {
        state.player = next;
        moves++;
      } else {
        const bx = nx + dx;
        const by = ny + dy;
        const pushed = idx(bx, by, level.size);
        if (!isFloor(level, bx, by) || state.blocks.some((block) => block.pos === pushed)) return;
        state.blocks[blockIndex].pos = pushed;
        state.player = next;
        moves++;
      }

      if (isGoal(level, state.blocks.map((block) => block.pos))) {
        won = true;
      }
      updateMeta();
      draw();
    }

    function draw() {
      if (!level || !state) return;
      const size = level.size;
      const scale = window.devicePixelRatio || 1;
      const cssSize = Math.min(canvas.clientWidth || 900, canvas.clientHeight || 900);
      canvas.width = Math.floor(cssSize * scale);
      canvas.height = Math.floor(cssSize * scale);
      ctx.setTransform(scale, 0, 0, scale, 0, 0);

      const tile = cssSize / size;
      ctx.clearRect(0, 0, cssSize, cssSize);

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const floorColor = (x + y) % 5 === 0 ? FLOOR_PALETTE.soft : (x + y) % 3 === 0 ? FLOOR_PALETTE.accent : FLOOR_PALETTE.base;
          ctx.fillStyle = level.grid[y][x] === TILE.WALL ? "#2f3947" : floorColor;
          ctx.fillRect(x * tile, y * tile, tile, tile);
          ctx.strokeStyle = level.grid[y][x] === TILE.WALL ? "#25303d" : FLOOR_PALETTE.grid;
          ctx.lineWidth = 1;
          ctx.strokeRect(x * tile, y * tile, tile, tile);
        }
      }

      level.targetCells.forEach((target, i) => {
        const pos = posFromIdx(target, size);
        ctx.fillStyle = "#f4c75f";
        ctx.fillRect(pos.x * tile + 4, pos.y * tile + 4, tile - 8, tile - 8);
        ctx.strokeStyle = "#9a7426";
        ctx.lineWidth = 2;
        ctx.strokeRect(pos.x * tile + 5, pos.y * tile + 5, tile - 10, tile - 10);
        drawText(String(i + 1), pos.x, pos.y, tile, "#5c4214", .42, 800);
      });

      state.blocks.forEach((block) => {
        const pos = posFromIdx(block.pos, size);
        const x = pos.x * tile;
        const y = pos.y * tile;
        if (sprites.block.ready) {
          ctx.drawImage(sprites.block.image, x + tile * .03, y + tile * .03, tile * .94, tile * .94);
        } else {
          ctx.fillStyle = "#d7b276";
          roundRect(x + 5, y + 5, tile - 10, tile - 10, Math.min(7, tile * .12));
          ctx.fill();
          ctx.strokeStyle = "rgba(0,0,0,.24)";
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        drawText(block.text, pos.x, pos.y, tile, "#243141", block.text.length > 3 ? .22 : .29, 900, -0.06, .64);
      });

      const player = posFromIdx(state.player, size);
      if (sprites.player.ready) {
        ctx.drawImage(sprites.player.image, player.x * tile + tile * .02, player.y * tile + tile * .02, tile * .96, tile * .96);
      } else {
        const cx = player.x * tile + tile / 2;
        const cy = player.y * tile + tile / 2;
        ctx.fillStyle = "#2f66b3";
        ctx.beginPath();
        ctx.arc(cx, cy, tile * .34, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#173f75";
        ctx.lineWidth = 2;
        ctx.stroke();
        drawText("P", player.x, player.y, tile, "#ffffff", .32, 900);
      }
    }

    function roundRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function drawText(text, gridX, gridY, tile, color, ratio, weight, offsetY = 0, maxWidthRatio = .9) {
      ctx.fillStyle = color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = weight + " " + Math.max(11, Math.floor(tile * ratio)) + "px system-ui, sans-serif";
      ctx.fillText(text, gridX * tile + tile / 2, gridY * tile + tile / 2 + tile * offsetY, tile * maxWidthRatio);
    }

    window.addEventListener("keydown", (event) => {
      const keys = {
        ArrowUp: [0, -1],
        KeyW: [0, -1],
        ArrowDown: [0, 1],
        KeyS: [0, 1],
        ArrowLeft: [-1, 0],
        KeyA: [-1, 0],
        ArrowRight: [1, 0],
        KeyD: [1, 0]
      };
      const dir = keys[event.code];
      if (!dir) return;
      event.preventDefault();
      movePlayer(dir[0], dir[1]);
    });

    document.querySelectorAll("[data-dir]").forEach((button) => {
      button.addEventListener("click", () => {
        const [dx, dy] = button.dataset.dir.split(",").map(Number);
        movePlayer(dx, dy);
      });
    });

    speakButton.addEventListener("click", speakWord);
    settingsButton.addEventListener("click", () => {
      const opening = settingsPanel.hidden;
      settingsPanel.hidden = !opening;
      settingsButton.setAttribute("aria-expanded", String(opening));
    });
    closeSettingsButton.addEventListener("click", () => {
      settingsPanel.hidden = true;
      settingsButton.setAttribute("aria-expanded", "false");
      settingsButton.focus();
    });
    resetButton.addEventListener("click", resetCurrentLevel);
    newButton.addEventListener("click", loadNewLevel);
    lengthSelect.addEventListener("input", updateSettingLabels);
    sizeSelect.addEventListener("input", updateSettingLabels);
    wallCountSelect.addEventListener("input", updateSettingLabels);
    wallMinLengthSelect.addEventListener("input", updateSettingLabels);
    wallLengthSelect.addEventListener("input", updateSettingLabels);
    lengthSelect.addEventListener("change", applySettingChange);
    sizeSelect.addEventListener("change", applySettingChange);
    wallCountSelect.addEventListener("change", applySettingChange);
    wallMinLengthSelect.addEventListener("change", applySettingChange);
    wallLengthSelect.addEventListener("change", applySettingChange);
    window.addEventListener("resize", draw);

    window.__wordobanTest = {
      generateLevel,
      solveLevel,
      setSettings(length, size, wallCount, minWallLength, maxWallLength) {
        lengthSelect.value = String(length);
        sizeSelect.value = String(size);
        if (wallCount !== undefined) wallCountSelect.value = String(wallCount);
        if (maxWallLength === undefined && minWallLength !== undefined) {
          wallLengthSelect.value = String(minWallLength);
        } else {
          if (minWallLength !== undefined) wallMinLengthSelect.value = String(minWallLength);
          if (maxWallLength !== undefined) wallLengthSelect.value = String(maxWallLength);
        }
        updateSettingLabels();
      },
      current() {
        return { level, state, won, moves };
      }
    };

    async function initializeGame() {
      await loadWords();
      updateSettingLabels();
      loadNewLevel();
    }

    initializeGame();
  </script>
</body>
</html>
